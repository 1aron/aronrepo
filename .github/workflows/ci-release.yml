name: CI & Release
on:
    push:
        branches:
            - "**"
    pull_request:
        types:
            - opened
            - reopened
            - edited
            - synchronize

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 11.9.0
            - uses: actions/setup-node@v6
              with:
                  node-version: 26
                  cache: pnpm
            - uses: actions/cache@v6
              with:
                  path: .turbo/cache
                  key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-${{ github.ref_name }}-
                      ${{ runner.os }}-turbo-
            - run: pnpm install --frozen-lockfile
            - run: pnpm run lint

    type-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 11.9.0
            - uses: actions/setup-node@v6
              with:
                  node-version: 26
                  cache: pnpm
            - uses: actions/cache@v6
              with:
                  path: .turbo/cache
                  key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-${{ github.ref_name }}-
                      ${{ runner.os }}-turbo-
            - run: pnpm install --frozen-lockfile
            - run: pnpm run type-check

    test:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 11.9.0
            - uses: actions/setup-node@v6
              with:
                  node-version: 26
                  cache: pnpm
            - uses: actions/cache@v6
              with:
                  path: .turbo/cache
                  key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-${{ github.ref_name }}-
                      ${{ runner.os }}-turbo-
            - run: pnpm install --frozen-lockfile
            - run: pnpm run test

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 11.9.0
            - uses: actions/setup-node@v6
              with:
                  node-version: 26
                  cache: pnpm
            - uses: actions/cache@v6
              with:
                  path: .turbo/cache
                  key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-${{ github.ref_name }}-
                      ${{ runner.os }}-turbo-
            - run: pnpm install --frozen-lockfile
            - run: pnpm run build

    release:
        needs:
            - lint
            - type-check
            - test
            - build
        if: ${{ github.event_name == 'push' && contains(fromJSON('["main","alpha","beta","rc","canary"]'), github.ref_name) }}
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
            id-token: write
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  version: 11.9.0
            - uses: actions/setup-node@v6
              with:
                  node-version: 26
                  cache: pnpm
            - uses: actions/cache@v6
              with:
                  path: .turbo/cache
                  key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-${{ github.ref_name }}-
                      ${{ runner.os }}-turbo-
            - run: pnpm install --frozen-lockfile
            - run: pnpm exec semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
