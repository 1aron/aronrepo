name: Check title of pull request
on:
    pull_request_target:
        types:
            - opened
            - reopened
            - edited
            - synchronize

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: 1aron/aronrepo@main
              with:
                  action: check-pull-request-title
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
